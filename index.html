<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BSU - Profile Photo Frame</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Celebrate unity and student activism with the BSU Profile Photo Frame! Customize your social media profile to proudly represent the Bangladesh Students' Union.">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo.png">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    canvas {
  width: 100%;
  max-width: 360px;
  height: auto;
}

    .logo {
      height: 40px;
    }
    footer {
      margin-top: 40px;
      padding: 20px 0;
      background: #f8f9fa;
      text-align: center;
    }
    .coffee-banner {
      text-align: center;
      margin: 30px 0;
    }
  </style>
</head>
<body>

<!-- Header -->
<nav class="navbar navbar-light bg-light px-3">
  <a class="navbar-brand d-flex align-items-center" href="#">
    <img src="logo.png" alt="Logo" class="logo me-2">
    <strong>BSU Profile Photo Frame </strong>
  </a>
</nav>

<!-- Main Content -->
<div class="container my-5">
  <div class="text-center">
    <h2>বাংলাদেশ ছাত্র ইউনিয়নের ৭৪তম প্রতিষ্ঠাবার্ষিকী </h2>
    <canvas id="canvas" class="my-4"></canvas>
  </div>

  <div class="text-center">
    <h4>Upload Your Photo</h4>
    <input type="file" id="upload" class="form-control w-50 mx-auto mt-3" accept="image/*">
    <button id="downloadBtn" class="btn btn-primary mt-4">Download Your Photo</button>
  </div>

</div>

<!-- Footer -->
<footer>
  <div class="container">
    <p>&copy; Made with &#9829; from Bangladesh.</p>
  </div>
</footer>

<!-- JavaScript -->
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const FB_SIZE = 1080;
canvas.width = FB_SIZE;
canvas.height = FB_SIZE;

const frameImg = new Image();
frameImg.src = 'frame74.png';

frameImg.onload = () => {
  drawCombined(frameImg); // initial preview
};

function drawCombined(userImg) {
  ctx.clearRect(0, 0, FB_SIZE, FB_SIZE);

  // Draw user image (cover-style crop)
  const scale = Math.max(
    FB_SIZE / userImg.width,
    FB_SIZE / userImg.height
  );

  const x = (FB_SIZE - userImg.width * scale) / 2;
  const y = (FB_SIZE - userImg.height * scale) / 2;

  ctx.drawImage(
    userImg,
    x,
    y,
    userImg.width * scale,
    userImg.height * scale
  );

  // Draw frame on top
  ctx.drawImage(frameImg, 0, 0, FB_SIZE, FB_SIZE);
}

document.getElementById('upload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const userImg = new Image();
  userImg.onload = () => drawCombined(userImg);
  userImg.src = URL.createObjectURL(file);
});

document.getElementById('downloadBtn').addEventListener('click', function() {
  const link = document.createElement('a');
  link.download = 'bsu-facebook-profile.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});
</script>

</body>
        </html>
